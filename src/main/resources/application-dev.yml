# ====================== Zincoid's 开发配置文件 ====================== #
# 注: 开发使用 开发修改配置使用此配置文件.
# ================================================================== #

zincoid:

  # ─────────────────────────── 数据存储 ─────────────────────────── #
  database:
    url: jdbc:mysql://localhost:3306/zincoid        # 数据库地址
    username: root                                  # 数据库用户名
    password: root                                  # 数据库密码

  # ─────────────────────────── 身份验证 ─────────────────────────── #
  jwt:
    secret: d639ee15-98f0-4eae-8534-347872e2e10e    # 密钥
    expiration: 86400                               # 过期时间 (单位: 秒)

  # ─────────────────────────── 文件上传 ─────────────────────────── #
  upload:
    path: ${user.dir}/files                         # 文件保存路径
    max-size: 200MB                                 # 文件大小限制
